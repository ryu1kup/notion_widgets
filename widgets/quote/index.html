<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Defaults — overridden by URL params via JS */
    :root {
      --color: #000000;
      --bg: transparent;
      --font: Georgia, 'Times New Roman', serif;
      --fontsize: clamp(0.95rem, 3vw, 1.4rem);
    }

    @media (prefers-color-scheme: dark) {
      :root { --color: #eeeeee; }
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
      padding: 1.5rem;
      cursor: default;
      user-select: none;
    }

    #quote-wrap {
      width: 100%;
      text-align: center;
    }

    #quote-wrap.animate {
      animation: fadein 0.5s ease both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #quote-text {
      color: var(--color);
      font-family: var(--font);
      font-size: var(--fontsize);
      font-style: normal;
      line-height: 1.7;
      text-wrap: balance;
    }

    #quote-author {
      color: var(--color);
      font-family: var(--font);
      font-size: calc(var(--fontsize) * 0.75);
      font-style: normal;
      margin-top: 0.9em;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div id="quote-wrap">
    <p id="quote-text"></p>
    <p id="quote-author"></p>
  </div>

  <script>
    /*
     * URL Parameters
     * ──────────────────────────────────────────────────
     * color   Text color. Hex (with/without #) or CSS color name.
     *         Example: color=222222  color=royalblue
     *
     * bg      Background color. Same format as color.
     *         Example: bg=1a1a2e  bg=white
     *         (default: transparent — recommended for Notion)
     *
     * font    Font-family string.
     *         Example: font=Arial  font=Georgia
     *
     * fontsize  Font size for quote text (CSS value).
     *           Example: fontsize=1.2rem  fontsize=18px  fontsize=2vw
     * ──────────────────────────────────────────────────
     * Double-click anywhere to show the next quote.
     * The daily quote resets automatically at midnight (UTC).
     * ──────────────────────────────────────────────────
     */

    const params = new URLSearchParams(location.search);
    const root   = document.documentElement;

    function toColor(v) {
      if (!v) return null;
      return /^[0-9a-fA-F]{3,8}$/.test(v) ? '#' + v : v;
    }

    const color    = toColor(params.get('color'));
    const bg       = toColor(params.get('bg'));
    const font     = params.get('font');
    const fontsize = params.get('fontsize');

    if (color)    root.style.setProperty('--color', color);
    if (bg)       root.style.setProperty('--bg', bg);
    if (font)     root.style.setProperty('--font', font);
    if (fontsize) root.style.setProperty('--fontsize', fontsize);

    // ── Quote selection ──────────────────────────────

    // Deterministic daily index: changes once per day at midnight UTC.
    function dailyIndex(n) {
      const daySeed = Math.floor(Date.now() / 86400000);
      let h = (daySeed ^ 0xdeadbeef) >>> 0;
      h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) >>> 0;
      h = Math.imul(h ^ (h >>> 16), 0x45d9f3b) >>> 0;
      return ((h ^ (h >>> 16)) >>> 0) % n;
    }

    let quotes   = [];
    let offset   = 0; // incremented on each double-click

    const wrap     = document.getElementById('quote-wrap');
    const textEl   = document.getElementById('quote-text');
    const authorEl = document.getElementById('quote-author');

    function showQuote(idx) {
      const q = quotes[idx];
      // Restart CSS animation
      wrap.classList.remove('animate');
      void wrap.offsetWidth;
      wrap.classList.add('animate');
      textEl.textContent   = q.text;
      authorEl.textContent = '— ' + q.author;
    }

    document.body.addEventListener('dblclick', () => {
      if (!quotes.length) return;
      offset = (offset + 1) % quotes.length;
      showQuote((dailyIndex(quotes.length) + offset) % quotes.length);
    });

    // ── Quotes data ─────────────────────────────────
    // Edit this array to add / remove quotes.
    quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Imagination is more important than knowledge.", author: "Albert Einstein" },
      { text: "In order to be irreplaceable, one must always be different.", author: "Coco Chanel" },
      { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford" },
      { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
      { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison" },
      { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
      { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
      { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
      { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa" },
      { text: "Don't judge each day by the harvest you reap but by the seeds that you plant.", author: "Robert Louis Stevenson" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "An unexamined life is not worth living.", author: "Socrates" },
      { text: "You will face many defeats in life, but never let yourself be defeated.", author: "Maya Angelou" },
      { text: "In the end, it's not the years in your life that count. It's the life in your years.", author: "Abraham Lincoln" },
      { text: "Never let the fear of striking out keep you from playing the game.", author: "Babe Ruth" },
      { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller" },
      { text: "Many of life's failures are people who did not realize how close they were to success when they gave up.", author: "Thomas Edison" },
      { text: "You have brains in your head. You have feet in your shoes. You can steer yourself any direction you choose.", author: "Dr. Seuss" },
      { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
      { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt" },
      { text: "Always remember that you are absolutely unique. Just like everyone else.", author: "Margaret Mead" },
      { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost" },
    ];

    showQuote(dailyIndex(quotes.length));
  </script>
</body>
</html>
